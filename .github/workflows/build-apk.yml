name: Mobile Cloud Compile Production APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter Framework
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Auto-Generate Full Flutter Scaffolding
        run: |
          cd ..
          flutter create --org com.technomak.hse --project-name=technomak_hse_app app_factory
          cp ${{ github.workspace }}/main.dart app_factory/lib/main.dart
          cp ${{ github.workspace }}/pubspec.yaml app_factory/pubspec.yaml
          cd app_factory
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/

      - name: Upload Compiled APK to Mobile Device
        uses: actions/upload-artifact@v4
        with:
          name: technomak-hse-mobile-apk
          path: app-release.apk
