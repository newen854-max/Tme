name: Mobile Cloud Compile Production APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter Framework
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Auto-Generate Full Flutter Scaffolding
        run: |
          # Find the exact absolute paths of main.dart and pubspec.yaml anywhere in the workspace
          MAIN_PATH=$(find $GITHUB_WORKSPACE -name "main.dart" | head -n 1)
          PUB_PATH=$(find $GITHUB_WORKSPACE -name "pubspec.yaml" | head -n 1)
          
          echo "Found main.dart at: $MAIN_PATH"
          echo "Found pubspec.yaml at: $PUB_PATH"
          
          cd ..
          flutter create --org com.technomak.hse --project-name=technomak_hse_app app_factory
          
          # Copy the dynamically located files into our app factory
          cp "$MAIN_PATH" app_factory/lib/main.dart
          cp "$PUB_PATH" app_factory/pubspec.yaml
          
          cd app_factory
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/

      - name: Upload Compiled APK to Mobile Device
        uses: actions/upload-artifact@v4
        with:
          name: technomak-hse-mobile-apk
          path: app-release.apk

      - name: Upload Compiled APK to Mobile Device
        uses: actions/upload-artifact@v4
        with:
          name: technomak-hse-mobile-apk
          path: app-release.apk
